
  
syntax = "proto3";

option java_multiple_files = true;
option java_outer_classname = "grocery_serviceProto";

package grocery;

//The grocery management service definition

service GroceryManagementService {
// Unary method
  rpc AddGroceryItem (GroceryItemRequest) returns (GroceryItemResponse);

// Bi-directional streaming method 
rpc LiveGroceryList (stream GroceryUpdateRequest) returns (stream GroceryListResponse);
}

//The request message containing the item's name, the quantity and the name of person adding the item
message GroceryItemRequest {
  string itemName = 1;
  int32 quantity = 2;
  string addedBy = 3;
}

//The response message containing 
message GroceryItemResponse {
  bool success = 1;
  string message = 2;
}

//The request message containing the action type whether add or remove item,name of item and the quantity.
message GroceryUpdateRequest {
    string actionType = 1;
    string itemName = 2;
    int32 quantity = 3;
}
  

//The response message containing the updated grocery list,name of item and quantity.
message GroceryListResponse {
    repeated string updatedGroceryList = 1;
    string itemName = 2;
    int32 quantity = 3;
}